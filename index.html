<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prankraft – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #6B21E8;
    --purple-dark: #4A0FAD;
    --purple-light: #8B47F5;
    --purple-pale: #C4A8F7;
    --black: #0D0D0D;
    --white: #FAFAFA;
    --gray: #F0EEF5;
    --gray2: #E2DEEE;
    --text-muted: #9B93B0;
    --danger: #FF3B30;
    --success: #34C759;
  }

  /* 🌙 DARK MODE VARIABLES */
body.dark-mode {
  --white: #0F0F14;
  --black: #F5F5F7;

  --gray: #1A1A22;
  --gray2: #2A2A35;

  --text-muted: #A1A1B5;

  --purple: #8B47F5;
  --purple-dark: #6B21E8;
  --purple-light: #A678FF;
  --purple-pale: #3A2A5E;
}

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    overflow-x: hidden;
  }
  body:has(#themeToggle:checked) {
   --white: #0D0D0D;
   --black: #FAFAFA;
   --gray: #1A1A1A;
   --gray2: #2A2A2A;
   --text-muted: #B0A8C5;
  }
  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 57% 1fr;
    height: 100vh;
  }

  /* ── LEFT PANEL ── */
  .left {
    background: var(--purple);
    position: relative;
    overflow: hidden;
  }

  .left-noise {
    position: absolute; inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 18px 18px;
    pointer-events: none;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    background: var(--purple-dark);
    opacity: 0.55;
    filter: blur(0px);
  }
  .blob-1 { width: 340px; height: 340px; top: -80px; left: -60px; border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
  .blob-2 { width: 260px; height: 280px; top: 200px; left: 80px; border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; }
  .blob-3 { width: 200px; height: 220px; top: 420px; left: -30px; border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; }
  .blob-4 { width: 300px; height: 260px; top: 580px; left: 120px; border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%; }
  .blob-5 { width: 180px; height: 200px; top: 100px; left: 340px; border-radius: 30% 70% 60% 40% / 50% 50% 50% 50%; }
  .blob-6 { width: 240px; height: 220px; top: 680px; left: 300px; border-radius: 60% 40% 40% 60% / 30% 70% 30% 70%; }
  .blob-light { background: rgba(255,255,255,0.08); }

  /* ── RIGHT PANEL ── */
  .right {
    display: flex;
    flex-direction: column;
    padding: 0 52px;
    justify-content: center;
    position: relative;
    background: var(--white);
  }

  .top-nav {
  position: absolute;
  top: 28px; left: 0; right: 0;
  display: flex;
  align-items: center;
  gap: 28px;
  padding: 0 52px;
  font-size: 13px;
  font-weight: 500;
  color: var(--black);
}

.top-nav .lang {
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
}

.top-nav .signin-link {
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}.l {
  display: block;
  margin-bottom: 1.5em;
  font-size: 1em;
  cursor: pointer;
}

.l {
  background-color: rgba(0, 0, 0, 0.7);
  border-radius: 0.75em;
  box-shadow: 0.125em 0.125em 0 0.125em rgba(0, 0, 0, 0.3) inset;
  color: #fdea7b;
  display: inline-flex;
  align-items: center;
  margin: auto;
  padding: 0.15em;
  width: 3em;
  height: 1.5em;
  transform: scale(0.9);
  transition:
    background-color 0.1s 0.3s ease-out,
    box-shadow 0.1s 0.3s ease-out;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}

.l:before,
.l:after {
  content: "";
  display: block;
}

.l:before {
  background-color: #d7d7d7;
  border-radius: 50%;
  width: 1.2em;
  height: 1.2em;
  transition:
    background-color 0.1s 0.3s ease-out,
    transform 0.3s ease-out;
  z-index: 1;
}

.l:after {
  background:
    linear-gradient(transparent 50%, rgba(0, 0, 0, 0.15) 0) 0 50% / 50% 100%,
    repeating-linear-gradient(90deg, #bbb 0, #bbb, #bbb 20%, #999 20%, #999 40%)
      0 50% / 50% 100%,
    radial-gradient(circle at 50% 50%, #888 25%, transparent 26%);
  background-repeat: no-repeat;
  border: 0.25em solid transparent;
  border-left: 0.4em solid #d8d8d8;
  border-right: 0 solid transparent;
  transition:
    border-left-color 0.1s 0.3s ease-out,
    transform 0.3s ease-out;
  transform: translateX(-22.5%);
  transform-origin: 25% 50%;
  width: 1.2em;
  height: 1em;
  box-sizing: border-box;
}
/* Checked */
.l:checked {
  background-color: rgba(0, 0, 0, 0.45);
  box-shadow: 0.125em 0.125em 0 0.125em rgba(0, 0, 0, 0.1) inset;
}

.l:checked:before {
  background-color: currentColor;
  transform: translateX(125%);
}

.l:checked:after {
  border-left-color: currentColor;
  transform: translateX(-2.5%) rotateY(180deg);
}
/* Other States */
.l:focus {
  /* Usually an anti-A11Y practice but set to remove an annoyance just for this demo */
  outline: 0;
}


/* 🌗 Toggle placement */
#themeToggle {
  margin-left: auto;
  margin-right: 12px;
  flex-shrink: 0;
}

/* Register button stays same (no margin-left now) */
.top-nav .register-btn {
  background: var(--black);
  color: var(--white);
  border: none;
  border-radius: 999px;
  padding: 8px 22px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  letter-spacing: 0.03em;
}

  .form-area { max-width: 360px; width: 100%; }

  .form-title {
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    line-height: 1.15;
    color: var(--black);
    margin-bottom: 36px;
  }

  .field {
    background: var(--gray);
    border: 2px solid transparent;
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 15px;
    font-family: inherit;
    color: var(--black);
    width: 100%;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 14px;
    display: block;
  }
  .field::placeholder { color: var(--text-muted); }
  .field:focus { border-color: var(--purple); background: var(--white); }

  .forgot {
    text-align: right;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 28px;
    cursor: pointer;
  }
  .forgot:hover { color: var(--purple); }

  .sign-in-btn {
    width: 100%;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 14px;
    padding: 17px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: transform 0.15s, background 0.2s;
    margin-bottom: 28px;
  }
  .sign-in-btn:hover { background: var(--purple); transform: translateY(-1px); }
  .sign-in-btn:active { transform: translateY(0); }

  .divider {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text-muted);
    margin-bottom: 24px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gray2);
  }

  .social-row { display: flex; gap: 12px; margin-bottom: 28px; }
  .social-btn {
    flex: 1;
    border: 2px solid var(--gray2);
    border-radius: 14px;
    padding: 14px;
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, transform 0.15s;
  }
  .social-btn:hover { border-color: var(--purple-pale); transform: translateY(-1px); }
  .social-btn svg { width: 24px; height: 24px; }

  .create-acc {
    font-size: 14px; color: var(--text-muted); text-align: center;
  }
  .create-acc a { color: var(--black); font-weight: 700; text-decoration: none; }
  .create-acc a:hover { color: var(--purple); }

  /* ── CAPTCHA OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }

  .captcha-box {
    background: white;
    border-radius: 20px;
    padding: 32px;
    width: 420px;
    max-width: 92vw;
    box-shadow: 0 32px 80px rgba(0,0,0,0.25);
    position: relative;
    transform: scale(0.9) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    font-family: 'DM Sans', sans-serif;
  }
  .overlay.show .captcha-box { transform: scale(1) translateY(0); }

  .captcha-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .captcha-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 800;
    color: var(--black);
  }
  .captcha-brand {
    font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.4;
  }
  .captcha-brand span { display: block; font-weight: 700; color: var(--purple); font-size: 13px; }

  .captcha-instruction {
    font-size: 14px; color: #444;
    margin-bottom: 16px;
    min-height: 40px;
    line-height: 1.5;
  }

  /* grid captcha */
  .img-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 18px;
    border: 2px solid var(--gray2);
    border-radius: 10px;
    overflow: hidden;
  }
  .img-cell {
    aspect-ratio: 1;
    cursor: pointer;
    position: relative;
    background: var(--gray);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    border: 3px solid transparent;
    transition: border-color 0.15s, filter 0.15s;
    user-select: none;
  }
  .img-cell.selected { border-color: var(--purple); background: #f0e8ff; }
  .img-cell.selected::after {
    content: '✓';
    position: absolute; top: 3px; right: 5px;
    font-size: 13px; color: var(--purple); font-weight: 800;
  }

  .captcha-footer {
    display: flex; align-items: center; gap: 10px;
  }
  .captcha-refresh {
    background: none; border: 2px solid var(--gray2);
    border-radius: 10px; padding: 10px 14px;
    cursor: pointer; font-size: 18px;
    transition: border-color 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .captcha-refresh:hover { border-color: var(--purple); transform: rotate(180deg); }

  .captcha-verify {
    flex: 1;
    background: var(--purple);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .captcha-verify:hover { background: var(--purple-dark); transform: translateY(-1px); }

  .captcha-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; font-size: 22px;
    cursor: pointer; color: var(--text-muted);
    line-height: 1;
  }

  /* ── STAGE-SPECIFIC STYLES ── */

  /* Stage 2: slider */
  .slider-wrap { margin-bottom: 18px; }
  .slider-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display:flex; justify-content:space-between; }
  input[type=range] {
    width: 100%; accent-color: var(--purple); cursor: pointer;
    height: 6px; border-radius: 3px;
  }
  .slider-target {
    font-size: 12px; color: var(--purple); font-weight: 700;
    text-align: center; margin-top: 4px;
  }

  /* Stage 3: math */
  .math-display {
    background: var(--black);
    color: var(--white);
    border-radius: 12px;
    padding: 20px;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 14px;
    letter-spacing: 2px;
  }
  .math-input {
    width: 100%;
    border: 2px solid var(--gray2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .math-input:focus { border-color: var(--purple); }

  /* Stage 4: drag */
  .drag-area {
    border: 2px dashed var(--gray2);
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    min-height: 110px;
    transition: border-color 0.2s;
  }
  .drag-area.over { border-color: var(--purple); background: #f8f4ff; }
  .drag-item {
    display: inline-block;
    background: var(--gray);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: grab;
    user-select: none;
    margin: 4px;
    border: 2px solid var(--gray2);
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .drag-item:hover { border-color: var(--purple-pale); transform: scale(1.04); }
  .drag-item.dragging { opacity: 0.4; }
  .drop-zone {
    display: inline-flex;
    align-items: center; justify-content: center;
    min-width: 90px;
    height: 40px;
    border: 2px dashed var(--purple-pale);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-muted);
    padding: 0 10px;
    margin: 4px;
    vertical-align: middle;
  }
  .drop-zone.filled { border-style: solid; border-color: var(--purple); background: #f0e8ff; color: var(--purple); font-weight: 700; }

  /* Stage 5: impossible */
  .impossible-task {
    background: var(--gray);
    border: 2px solid #FFD600;
    border-radius: 12px;
    padding: 18px;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
    margin-bottom: 14px;
  }
  .impossible-task strong { color: var(--black); }
  .checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .checkbox-row input[type=checkbox] { margin-top: 3px; accent-color: var(--purple); width: 16px; height: 16px; cursor: pointer; }

  /* Success screen */
  .success-screen {
    text-align: center; padding: 10px 0;
  }
  .success-icon {
    font-size: 64px; margin-bottom: 16px;
    animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes pop { from { transform: scale(0); opacity:0; } to { transform: scale(1); opacity:1; } }
  .success-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
  .success-ok {
    background: var(--purple); color: white; border: none;
    border-radius: 10px; padding: 12px 32px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .success-ok:hover { background: var(--purple-dark); }

  /* progress dots */
  .stage-dots {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 18px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gray2); transition: background 0.3s;
  }
  .dot.done { background: var(--purple); }
  .dot.active { background: var(--purple-light); }

  /* shake animation */
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)}
    60%{transform:translateX(-6px)}
    80%{transform:translateX(6px)}
  }
  .shake { animation: shake 0.4s ease; }

  /* toast */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--black); color: white;
    border-radius: 999px; padding: 12px 24px;
    font-size: 14px; font-weight: 500;
    z-index: 999; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* stage 2 timer bar */
  .timer-bar-wrap { height: 6px; background: var(--gray2); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
  .timer-bar { height: 100%; background: var(--purple); border-radius: 3px; width: 100%; transition: width linear; }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 9999;
    animation: confetti-fall 1.2s ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  @media (max-width: 768px) {

  /* 🧱 Stack layout vertically */
  .layout {
    grid-template-columns: 1fr;
  }

  /* 🎨 Hide left blob panel (too heavy for mobile) */
  .left {
    display: none;
  }

  /* 📦 Right panel full width */
  .right {
    padding: 24px;
    justify-content: flex-start;
  }

  /* 🧭 Top nav spacing */
  .top-nav {
    position: static;
    padding: 0;
    margin-bottom: 24px;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ✨ Push toggle + register to right nicely */
  #themeToggle {
    margin-left: auto;
  }

  /* 📝 Title smaller */
  .form-title {
    font-size: 28px;
    margin-bottom: 24px;
  }

  /* 📦 Form width full */
  .form-area {
    max-width: 100%;
  }

  /* 🔘 Buttons more tappable */
  .sign-in-btn {
    padding: 16px;
    font-size: 15px;
  }

  /* 🔗 Social buttons stack better */
  .social-row {
    flex-direction: column;
  }

  /* 🧩 CAPTCHA box responsive */
  .captcha-box {
    width: 92vw;
    padding: 20px;
  }

  /* 🧠 Grid tighter */
  .img-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }

  /* 🎯 Make text readable */
  .captcha-instruction {
    font-size: 13px;
  }
}
</style>
</head>
<body>

<div class="layout">
  <!-- LEFT -->
  <div class="left">
    <div class="left-noise"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="blob blob-5 blob-light"></div>
    <div class="blob blob-6 blob-light"></div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <nav class="top-nav">
      <span class="lang">▾ English</span>
      <span class="signin-link">Sign In</span>
      <input type="checkbox" id="themeToggle" class="l">
      <button class="register-btn">REGISTER</button>
    </nav>

    <div class="form-area">
      <h1 class="form-title">Hello!<br>Welcome Back</h1>

      <input class="field" type="email" id="emailField" placeholder="Email" autocomplete="off">
      <input class="field" type="password" id="passField" placeholder="Password" autocomplete="off">
      <div class="forgot">Forgot Password?</div>

      <button class="sign-in-btn" id="signInBtn" onclick="startCaptcha()">Sign In</button>

      <div class="divider">Or continue with</div>

      <div class="social-row">
        <!-- Apple -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.4c1.33.07 2.25.72 3.03.73.91-.18 1.78-.84 3.17-.9 1.54.07 2.7.67 3.45 1.79-3.15 1.86-2.4 5.95.6 7.07-.62 1.55-1.42 3.06-2.25 4.19zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        </button>
        <!-- Google -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        </button>
        <!-- Facebook -->
        <button class="social-btn">
          <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        </button>
      </div>

      <p class="create-acc">Don't Have an Account? <a href="#">Create Account</a></p>
    </div>
  </div>
</div>

<!-- CAPTCHA OVERLAY -->
<div class="overlay" id="overlay">
  <div class="captcha-box" id="captchaBox">
    <button class="captcha-close" onclick="closeOverlay()">×</button>
    <div id="captchaContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let currentStage = 0;
  const totalStages = 5;

  // ── HELPERS ──
  function showToast(msg, duration = 2000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function shake(el) {
    el.classList.remove('shake');
    void el.offsetWidth;
    el.classList.add('shake');
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
  }

  function openOverlay() {
    document.getElementById('overlay').classList.add('show');
  }

  function startCaptcha() {
    const email = document.getElementById('emailField').value.trim();
    const pass = document.getElementById('passField').value.trim();
    if (!email || !pass) {
      shake(document.querySelector('.form-area'));
      showToast('Please fill in your details first 😉');
      return;
    }
    currentStage = 0;
    openOverlay();
    renderStage(currentStage);
  }

  function nextStage() {
    currentStage++;
    if (currentStage >= totalStages) {
      renderSuccess();
    } else {
      renderStage(currentStage);
    }
  }

  function dotsHTML(active) {
    let h = '<div class="stage-dots">';
    for (let i = 0; i < totalStages; i++) {
      if (i < active) h += '<div class="dot done"></div>';
      else if (i === active) h += '<div class="dot active"></div>';
      else h += '<div class="dot"></div>';
    }
    h += '</div>';
    return h;
  }

  // ── STAGE RENDERER ──
  function renderStage(s) {
    const content = document.getElementById('captchaContent');
    if (s === 0) renderStage0(content);
    else if (s === 1) renderStage1(content);
    else if (s === 2) renderStage2(content);
    else if (s === 3) renderStage3(content);
    else if (s === 4) renderStage4(content);
  }

  // ── STAGE 0: Pick all traffic lights (some are traps) ──
  function renderStage0(el) {
    const emojis = ['🚦','🍎','🚦','🌳','🚦','🍕','🛑','🚥','🌮','🚦','🌵','🚦','🛸','🚦','🧁','🚦'];    // shuffle
    const items = emojis.map((e,i) => ({e, i})).sort(() => Math.random()-0.5);
    el.innerHTML = `
      <div class="captcha-header">
        <div class="captcha-title">Security Check</div>
        <div class="captcha-brand"><span>hCaptcha</span>Privacy Pass</div>
      </div>
      ${dotsHTML(0)}
      <div class="captcha-instruction">Select all images with <strong>traffic lights 🚦</strong></div>
      <div class="img-grid" id="grid0">
        ${items.map(it => `<div class="img-cell" data-emoji="${it.e}" onclick="toggleCell(this)">${it.e}</div>`).join('')}
      </div>
      <div class="captcha-footer">
        <button class="captcha-refresh" onclick="renderStage(0)">↻</button>
        <button class="captcha-verify" onclick="verifyStage0()">Verify</button>
      </div>
    `;
  }

  window.toggleCell = function(el) {
  el.classList.toggle('selected');

  const selected = [...document.querySelectorAll('#grid0 .img-cell.selected')];

  // 😈 If user is doing TOO well, sabotage ONE correct pick
  const correctSelected = selected.filter(c => c.dataset.emoji === '🚦');

  if (correctSelected.length >= 4 && Math.random() < 0.25) {
    const victim = correctSelected[Math.floor(Math.random() * correctSelected.length)];
    victim.classList.remove('selected');
    showToast('Hmm… look again 👀');
  }
}
  window.verifyStage0 = function() {
    const selected = [...document.querySelectorAll('#grid0 .img-cell.selected')];
    const allTraffic = [...document.querySelectorAll('#grid0 .img-cell')].filter(c => c.dataset.emoji === '🚦');
    const selectedTraffic = selected.filter(c => c.dataset.emoji === '🚦');
    const wrongSelected = selected.filter(c => c.dataset.emoji !== '🚦');

    if (selectedTraffic.length === allTraffic.length && wrongSelected.length === 0) {
      // They got it right — trick them
      showToast('✓ Correct! Moving on... 😈');
      setTimeout(nextStage, 600);
    } else {
      shake(document.getElementById('captchaBox'));
      showToast('Hmm, try again! Did you miss any? 🤔');
      renderStage0(document.getElementById('captchaContent'));
    }
  }

  // ── STAGE 1: Slider CAPTCHA — target keeps moving ──
  function renderStage1(el) {
    let target = Math.floor(Math.random() * 60) + 20;
    let moveCount = 0;

    el.innerHTML = `
      <div class="captcha-header">
        <div class="captcha-title">Slide to Verify</div>
        <div class="captcha-brand"><span>hCaptcha</span>Privacy Pass</div>
      </div>
      ${dotsHTML(1)}
      <div class="captcha-instruction">Drag the slider to exactly <strong id="targetVal">${target}</strong></div>
      <div class="slider-wrap">
        <div class="slider-label"><span>0</span><span>100</span></div>
        <input type="range" min="0" max="100" value="0" id="slideInput">
        <div class="slider-target">Your value: <span id="slideVal">0</span></div>
      </div>
      <div class="captcha-footer">
        <button class="captcha-refresh" onclick="renderStage(1)">↻</button>
        <button class="captcha-verify" onclick="verifyStage1(${target})">Verify</button>
      </div>
    `;

    document.getElementById('slideInput').addEventListener('input', function() {
      document.getElementById('slideVal').textContent = this.value;
      moveCount++;
      // Target moves every 3 interactions, sneakily
      if (moveCount % 3 === 0) {
        target = Math.floor(Math.random() * 60) + 20;
        document.getElementById('targetVal').textContent = target;
        document.querySelector('.captcha-verify').setAttribute('onclick', `verifyStage1(${target})`);
        showToast('Oops! Target updated 🎯');
      }
    });
  }

  window.verifyStage1 = function(target) {
    const val = parseInt(document.getElementById('slideInput').value);
    if (Math.abs(val - target) <= 2) {
      showToast('Impressive! Too impressive... 🧐');
      setTimeout(nextStage, 600);
    } else {
      shake(document.getElementById('captchaBox'));
      // Move target again on failure
      renderStage1(document.getElementById('captchaContent'));
      showToast(`Not quite! You had ${val}, needed ${target} 😅`);
    }
  }

  // ── STAGE 2: Timed math — timer resets if you type ──
function renderStage2(el) {
  const ops = ['+','-','×'];
  const op = ops[Math.floor(Math.random()*3)];
  const a = Math.floor(Math.random()*20)+5;
  const b = Math.floor(Math.random()*20)+5;
  let answer;
  if (op==='+') answer = a+b;
  else if (op==='-') answer = a-b;
  else answer = a*b;

  let timeLeft = 8;
  let timerActive = true;

  el.innerHTML = `
    <div class="captcha-header">
      <div class="captcha-title">Quick Math!</div>
      <div class="captcha-brand"><span>hCaptcha</span>Privacy Pass</div>
    </div>
    ${dotsHTML(2)}
    <div class="captcha-instruction">Solve this before the timer runs out. <strong>Don't think too hard!</strong></div>
    <div class="math-display">${a} ${op} ${b} = ?</div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar"></div></div>
    <input class="math-input" type="number" id="mathAns" placeholder="Your answer">
    <div class="captcha-footer">
      <button class="captcha-refresh" onclick="renderStage(2)">↻</button>
      <button class="captcha-verify" onclick="verifyStage2(${answer})">Verify</button>
    </div>
  `;

  const bar = document.getElementById('timerBar');

  const interval = setInterval(() => {
    if (!timerActive) return;

    timeLeft--;
    bar.style.width = (timeLeft/8*100)+'%';

    if (timeLeft <= 3) bar.style.background = '#FF3B30';

    if (timeLeft <= 0) {
      clearInterval(interval);
      timerActive = false;
      showToast('Time\'s up! 🏃 Let\'s try that again.');
      setTimeout(() => renderStage2(document.getElementById('captchaContent')), 800);
    }
  }, 1000);

  // ✅ FIX: Only reset ONCE when user starts typing
  let hasTyped = false;
  document.getElementById('mathAns').addEventListener('input', () => {
    if (!hasTyped) {
      hasTyped = true;
      timeLeft = 8;
      bar.style.width = '100%';
      bar.style.background = 'var(--purple)';
      showToast('Timer reset! 😇 One chance only.');
    }
  });

  // store interval so we can clear it later
  el._timerInterval = interval;
}

window.verifyStage2 = function(answer) {
  const val = parseInt(document.getElementById('mathAns').value);
  const el = document.getElementById('captchaContent');

  // ✅ stop timer before anything else
  if (el._timerInterval) {
    clearInterval(el._timerInterval);
  }

  if (val === answer) {
    showToast('Correct! But are you really human? 🤖');
    setTimeout(nextStage, 600);
  } else {
    shake(document.getElementById('captchaBox'));
    showToast(`Wrong! It was ${answer}. Refreshing... 🔄`);
    setTimeout(() => renderStage2(document.getElementById('captchaContent')), 800);
  }
}

  // ── STAGE 3: Drag & Drop word order (order is secretly wrong) ──
 function renderStage3(el) {
  const words = ['not', 'a', 'am', 'I', 'robot'];
  let selected = [];

  el.innerHTML = `
    <div class="captcha-header">
      <div class="captcha-title">Order Check</div>
      <div class="captcha-brand"><span>hCaptcha</span>Privacy Pass</div>
    </div>
    ${dotsHTML(3)}
    <div class="captcha-instruction">
      Tap words in order to form: <strong>"I am not a robot"</strong>
    </div>

    <div class="drag-area" id="wordBank">
      ${words.map(w => `<div class="drag-item" onclick="selectWord(this)" data-word="${w}">${w}</div>`).join('')}
    </div>

    <div id="dropZone" style="
      min-height:54px;
      border:2px dashed var(--gray2);
      border-radius:12px;
      padding:8px 12px;
      margin-bottom:14px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;">
    </div>

    <div class="captcha-footer">
      <button class="captcha-refresh" onclick="renderStage(3)">↻</button>
      <button class="captcha-verify" onclick="verifyStage3()">Verify</button>
    </div>
  `;

  window._selectedWords = [];
}

window.selectWord = function(el) {
  const word = el.dataset.word;

  // prevent double selection
  if (el.classList.contains('selected')) return;

  el.classList.add('selected');
  window._selectedWords.push(word);

  const chip = document.createElement('span');
  chip.textContent = word;
  chip.style.cssText = `
    background:var(--purple-pale);
    color:var(--purple-dark);
    border-radius:6px;
    padding:6px 12px;
    font-weight:700;
    font-size:14px;
  `;

  document.getElementById('dropZone').appendChild(chip);
}
window.verifyStage3 = function() {
  const correct = ['I','am','not','a','robot'];

  if (JSON.stringify(window._selectedWords) === JSON.stringify(correct)) {
    showToast('"I am not a robot" — sure about that? 🤨');
    setTimeout(nextStage, 700);
  } else {
    shake(document.getElementById('captchaBox'));
    showToast('Not quite the right order! 🔀');

    // reset for retry
    renderStage3(document.getElementById('captchaContent'));
  }
}

  // ── STAGE 4: The impossible checklist ──
  function renderStage4(el) {
  el.innerHTML = `
    <div class="captcha-header">
      <div class="captcha-title">Final Verification</div>
      <div class="captcha-brand"><span>hCaptcha</span>Privacy Pass</div>
    </div>
    ${dotsHTML(4)}
    <div class="captcha-instruction">Please confirm the following to prove you are <strong>human</strong>:</div>
    <div class="impossible-task">
      <div class="checkbox-row">
        <input type="checkbox" id="c1">
        <label for="c1">I have never thought about pizza at an inappropriate time</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="c2">
        <label for="c2">I can lick my elbow (please try now)</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="c3">
        <label for="c3">I agree that pineapple does not belong on pizza</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="c4">
        <label for="c4">I have read all 47 pages of Terms & Conditions (we know you haven't)</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="c5">
        <label for="c5">I solemnly swear that I am up to no good</label>
      </div>
    </div>
    <div class="captcha-footer">
      <button class="captcha-refresh" onclick="renderStage(4)">↻</button>
      <button class="captcha-verify" onclick="verifyStage4()">I Confirm (maybe)</button>
    </div>
  `;

  // --- Existing trick 1 ---
  document.getElementById('c1').addEventListener('change', function() {
    if (this.checked) {
      document.getElementById('c3').checked = false;
      showToast('Checking one unchecks another 🙃');
    }
  });

  // --- Existing trick 2 ---
  document.getElementById('c4').addEventListener('change', function() {
    if (!this.checked) {
      setTimeout(() => {
        this.checked = true;
        showToast('You agreed. You can\'t un-agree. 📜');
      }, 400);
    }
  });

  // 😈 NEW: order + chaos system
  let correctOrder = ['c1', 'c2', 'c5', 'c3']; // secret path
  let userOrder = [];

  ['c1','c2','c3','c4','c5'].forEach(id => {
  document.getElementById(id).addEventListener('change', function() {

    // ✅ track last checked
    if (this.checked) {
      window._lastCheckedBox = id;
    }

    if (this.checked) {
      userOrder.push(id);
      const index = userOrder.length - 1;

      if (correctOrder[index] !== id) {
        const candidates = ['c1','c2','c3','c5'];
        const checked = candidates.filter(cid => document.getElementById(cid).checked);

        if (checked.length > 0) {
          const victim = checked[Math.floor(Math.random() * checked.length)];
          document.getElementById(victim).checked = false;
          showToast('Oops… something changed 😵‍💫');
        }

        userOrder = [];
      }

    } else {
      userOrder = [];
    }

   });
 });
}
window.verifyStage4 = function() {
  const c1 = document.getElementById('c1').checked;
  const c2 = document.getElementById('c2').checked;
  const c3 = document.getElementById('c3').checked;
  const c5 = document.getElementById('c5').checked;

  // must all be checked
  const allChecked = c1 && c2 && c3 && c5;

  // 😈 c3 must be last clicked
  const lastClicked = window._lastCheckedBox === 'c3';

  if (allChecked && lastClicked) {
    showToast('…fine. you win. 🧠');

    // 🎉 go to success page
    setTimeout(() => {
      window.location.href = "success.html";
    }, 800);

  } else {
    shake(document.getElementById('captchaBox'));
    showToast('Hmm… something feels off 🤨');
  }
};
  // ── SUCCESS ──
  function renderSuccess() {
    const content = document.getElementById('captchaContent');
    content.innerHTML = `
      <div class="success-screen">
        <div class="success-icon">🎉</div>
        <div class="success-title">You are (probably) human!</div>
        <div class="success-sub">Congratulations on surviving 5 stages of completely reasonable security checks. Welcome back… we think.</div>
        <button class="success-ok" onclick="doLogin()">Finally, Sign Me In</button>
      </div>
    `;
    spawnConfetti();
  }

  window.doLogin = function() {
  window.location.href = "success.html";
}

  function spawnConfetti() {
    const colors = ['#6B21E8','#8B47F5','#FFD600','#FF3B30','#34C759','#FF9500'];
    for (let i = 0; i < 60; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random()*100+'vw';
      c.style.top = '-10px';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDelay = Math.random()*0.8+'s';
      c.style.animationDuration = (0.8 + Math.random()*0.8)+'s';
      c.style.width = c.style.height = (8+Math.random()*10)+'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }
  }

  // Close overlay on backdrop click
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeOverlay();
  });
</script>
</body>
